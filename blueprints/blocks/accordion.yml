title: Accordion
icon: list-number
preview: fields
wysiwyg: true

tabs:
  content:
    label: Content
    fields:
      items:
        type: structure
        label: Accordion Items
        sortable: true
        fields:
          title:
            type: text
            label: Title
            required: true
            width: 1/2

          disabled:
            type: toggle
            label: Disabled
            default: false
            width: 1/2
            help: "Prevent this item from being expanded or collapsed."

          text:
            type: blocks
            label: Content
            required: true
            fieldsets:
              - heading
              - text
              - list
              - button
              - carousel

  settings:
    label: Settings
    fields:
      html_id:
        extends: fields/html_id
        width: 1/2

      css_classes:
        extends: fields/css_classes
        width: 1/2

      allow_multiple_open:
        type: toggle
        label: Allow Multiple Open
        default: false
        width: 1/2
        help: "When enabled, multiple items can be expanded at the same time."
